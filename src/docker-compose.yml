services:
  database_postgres:
    container_name: postgres-stream
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432" # TODO: review this when putting on home server
    environment:
      POSTGRES_USER: streamer
      POSTGRES_PASSWORD: streamerWP14!
      POSTGRES_DB: mediadb 
    volumes:
      - ./postgres-data/:/var/lib/postgresql/data
